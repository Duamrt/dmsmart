<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#131720"/>
      <stop offset="100%" style="stop-color:#0E1014"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-dot">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo com borda sutil -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="none" stroke="#ffffff08" stroke-width="1.5"/>

  <!-- Linha decorativa superior (detalhe tech) -->
  <line x1="80" y1="168" x2="432" y2="168" stroke="#0057FF" stroke-width="1" opacity="0.18"/>
  <line x1="80" y1="344" x2="432" y2="344" stroke="#0057FF" stroke-width="1" opacity="0.18"/>

  <!-- Texto DM -->
  <text
    x="68"
    y="295"
    font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="148"
    letter-spacing="-4"
    fill="#F5F7FA"
  >DM</text>

  <!-- Texto SMART com cor azul -->
  <text
    x="68"
    y="370"
    font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-weight="700"
    font-size="72"
    letter-spacing="8"
    fill="#0057FF"
    filter="url(#glow)"
  >SMART</text>

  <!-- Ponto azul brilhante (marca do logo) -->
  <circle cx="448" cy="178" r="18" fill="#0057FF" filter="url(#glow-dot)"/>
  <circle cx="448" cy="178" r="10" fill="#4A8AFF"/>
</svg>
