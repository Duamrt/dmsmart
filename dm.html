<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DM</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icons/dm-192.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="DM"/>
  <meta name="theme-color" content="#00d4ff"/>
  <link rel="icon" href="/icons/dm-192.png" type="image/png"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:   #00d4ff;
      --bg:     #030712;
      --text:   #e2e8f0;
      --subtle: rgba(255,255,255,0.18);
      --glass:  rgba(255,255,255,0.04);
      --border: rgba(0,212,255,0.12);
    }

    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; user-select: none; }

    /* ── Background particle canvas ── */
    #bg-canvas { position: fixed; inset: 0; z-index: 0; }

    /* ── Scan line ── */
    .hud-scanline {
      position: fixed; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(0,212,255,0.35) 50%, transparent 100%);
      z-index: 2; animation: scan 10s linear infinite; pointer-events: none;
    }
    @keyframes scan { 0% { top: -2px; opacity: 0; } 3% { opacity: 1; } 97% { opacity: 1; } 100% { top: 100vh; opacity: 0; } }

    /* ── IDLE VIEW ── */
    #view-idle {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #view-idle.hidden { opacity: 0; pointer-events: none; transform: scale(0.96); }

    /* Clock — top right */
    #hud-clock {
      position: fixed; top: 44px; right: 56px;
      text-align: right; z-index: 20;
      transition: opacity 0.4s, transform 0.4s;
    }
    #hud-clock.hidden { opacity: 0; pointer-events: none; transform: translateY(-8px); }
    #hud-clock .time {
      font-size: 4rem; font-weight: 300; letter-spacing: 6px;
      color: var(--cyan); text-shadow: 0 0 24px rgba(0,212,255,0.45); line-height: 1;
    }
    #hud-clock .date { font-size: 0.6rem; letter-spacing: 3px; color: var(--subtle); margin-top: 8px; text-transform: uppercase; }

    /* Weather — top left */
    #hud-weather {
      position: fixed; top: 44px; left: 56px;
      z-index: 20; transition: opacity 0.4s, transform 0.4s;
    }
    #hud-weather.hidden { opacity: 0; pointer-events: none; transform: translateY(-8px); }
    #hud-weather .city { font-size: 0.55rem; letter-spacing: 3px; color: var(--subtle); text-transform: uppercase; margin-bottom: 6px; }
    #hud-weather .temp { font-size: 3rem; font-weight: 300; color: var(--text); line-height: 1; }
    #hud-weather .cond { font-size: 0.58rem; letter-spacing: 2px; color: var(--subtle); margin-top: 6px; text-transform: uppercase; }

    /* System info — bottom left (idle) */
    #hud-sysinfo {
      position: fixed; bottom: 44px; left: 56px;
      z-index: 20; transition: opacity 0.4s;
    }
    #hud-sysinfo.hidden { opacity: 0; pointer-events: none; }
    #hud-sysinfo .label { font-size: 0.5rem; letter-spacing: 3px; color: rgba(255,255,255,0.1); text-transform: uppercase; margin-bottom: 4px; }
    #hud-sysinfo .val   { font-size: 0.58rem; letter-spacing: 2px; color: rgba(0,212,255,0.35); }

    /* Corner brackets */
    .corner { position: fixed; z-index: 5; pointer-events: none; }
    .corner svg { display: block; }
    .corner--tl { top: 20px; left: 20px; }
    .corner--tr { top: 20px; right: 20px; transform: scaleX(-1); }
    .corner--bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
    .corner--br { bottom: 20px; right: 20px; transform: scale(-1); }

    /* Center orb */
    .orb-center { display: flex; flex-direction: column; align-items: center; gap: 28px; }
    .dm-logo { font-size: 0.65rem; font-weight: 300; letter-spacing: 8px; color: rgba(255,255,255,0.15); text-transform: uppercase; }

    .orb-system { position: relative; width: 240px; height: 240px; display: flex; align-items: center; justify-content: center; }

    .ring { position: absolute; border-radius: 50%; border: 1px solid; }
    .ring-1 { width: 190px; height: 190px; border-color: rgba(0,212,255,0.3); animation: rr 14s linear infinite; }
    .ring-1::before { content: ''; position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 7px; height: 7px; background: var(--cyan); border-radius: 50%; box-shadow: 0 0 14px var(--cyan); }
    .ring-2 { width: 224px; height: 224px; border-color: rgba(0,212,255,0.12); animation: rr 24s linear infinite reverse; }
    .ring-2::after { content: ''; position: absolute; bottom: -3px; right: 25%; width: 5px; height: 5px; background: rgba(0,212,255,0.5); border-radius: 50%; box-shadow: 0 0 8px rgba(0,212,255,0.5); }
    .ring-3 { width: 258px; height: 258px; border-color: rgba(0,212,255,0.06); border-style: dashed; animation: rr 40s linear infinite; }
    @keyframes rr { to { transform: rotate(360deg); } }

    /* Neural core canvas */
    #dm-core-wrap {
      position: relative; z-index: 2; cursor: pointer;
      width: 260px; height: 260px;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.3s;
    }
    #dm-core-wrap:hover { transform: scale(1.04); }
    #dm-core-canvas { display: block; }

    canvas#orb { display: none; }

    #dm-status { font-size: 0.58rem; letter-spacing: 5px; color: var(--cyan); text-transform: uppercase; min-height: 14px; transition: color 0.3s; }

    /* Shortcuts */
    #hud-shortcuts {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 14px; z-index: 20;
      transition: opacity 0.4s, transform 0.4s;
    }
    #hud-shortcuts.hidden { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(16px); }

    .sc { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; text-decoration: none; transition: transform 0.2s; }
    .sc:hover { transform: translateY(-5px); }
    .sc-icon {
      width: 46px; height: 46px; border: 1px solid var(--border); border-radius: 12px;
      background: var(--glass); display: flex; align-items: center; justify-content: center;
      font-size: 0.68rem; font-weight: 600; color: var(--cyan); letter-spacing: 0.5px;
      backdrop-filter: blur(10px); transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .sc:hover .sc-icon { background: rgba(0,212,255,0.1); border-color: rgba(0,212,255,0.35); box-shadow: 0 0 16px rgba(0,212,255,0.15); }
    .sc-label { font-size: 0.48rem; letter-spacing: 1.5px; color: rgba(255,255,255,0.25); text-transform: uppercase; }

    /* ── ACTIVE VIEW (chat) ── */
    #view-active {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      padding: 48px 56px 96px;
      gap: 16px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s ease, transform 0.5s ease;
      transform: scale(1.03);
    }
    #view-active.visible { opacity: 1; pointer-events: auto; transform: scale(1); }

    .active-header {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 20px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .active-title { font-size: 0.6rem; letter-spacing: 5px; color: rgba(255,255,255,0.2); text-transform: uppercase; }
    .btn-back {
      background: none; border: 1px solid var(--border); color: var(--subtle);
      font-family: 'JetBrains Mono', monospace; font-size: 0.58rem; letter-spacing: 2px;
      padding: 7px 16px; border-radius: 8px; cursor: pointer; text-transform: uppercase;
      transition: all 0.2s;
    }
    .btn-back:hover { color: var(--text); border-color: var(--cyan); }

    .feed-wrap {
      flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 6px;
    }
    .feed-wrap::-webkit-scrollbar { width: 2px; }
    .feed-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .dm-msg { padding: 12px 16px; border-radius: 10px; font-size: 0.875rem; line-height: 1.6; max-width: 78%; font-family: 'Inter', sans-serif; user-select: text; }
    .dm-msg--user { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6); align-self: flex-end; border-bottom-right-radius: 3px; }
    .dm-msg--dm   { background: rgba(0,212,255,0.06); border: 1px solid rgba(0,212,255,0.12); color: var(--text); align-self: flex-start; border-bottom-left-radius: 3px; }
    .empty-state  { color: rgba(255,255,255,0.12); font-size: 0.6rem; letter-spacing: 3px; text-align: center; text-transform: uppercase; margin: auto; }

    .input-row { display: flex; gap: 8px; flex-shrink: 0; }
    .dm-input {
      flex: 1; background: var(--glass); border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); padding: 14px 20px; font-size: 0.875rem; font-family: 'Inter', sans-serif;
      outline: none; backdrop-filter: blur(10px); transition: border-color 0.2s; user-select: text;
    }
    .dm-input:focus { border-color: rgba(0,212,255,0.35); }
    .dm-input::placeholder { color: rgba(255,255,255,0.15); font-size: 0.72rem; letter-spacing: 1px; }

    .btn-send {
      width: 48px; height: 48px; background: rgba(0,212,255,0.08); border: 1px solid var(--border);
      border-radius: 12px; color: var(--cyan); cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .btn-send:hover { background: rgba(0,212,255,0.18); border-color: rgba(0,212,255,0.35); }

    .btn-mic {
      width: 48px; height: 48px; background: rgba(0,212,255,0.08); border: 1px solid var(--border);
      border-radius: 12px; color: var(--cyan); cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .btn-mic:hover { background: rgba(0,212,255,0.18); border-color: rgba(0,212,255,0.35); }
    .btn-mic.dm-btn--ativo { background: rgba(255,60,60,0.15); border-color: rgba(255,60,60,0.5); color: #ff5555; animation: pulse-mic 1s infinite; }
    @keyframes pulse-mic { 0%,100% { box-shadow: 0 0 0 0 rgba(255,60,60,0.3); } 50% { box-shadow: 0 0 0 6px rgba(255,60,60,0); } }

    /* Mini orb indicator */
    #mini-orb {
      position: fixed; bottom: 28px; left: 28px;
      display: none; align-items: center; gap: 10px;
      cursor: pointer; z-index: 30;
    }
    .mini-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--cyan); box-shadow: 0 0 10px var(--cyan);
      animation: pd 2.4s ease-in-out infinite;
    }
    @keyframes pd { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.5; transform:scale(.8); } }
    .mini-label { font-size: 0.52rem; letter-spacing: 3px; color: rgba(255,255,255,0.2); text-transform: uppercase; }

    /* ── Side panel ── */
    #dm-painel {
      position: fixed; top: 0; right: 0;
      width: min(480px, 90vw); height: 100vh;
      background: #0a1120; border-left: 1px solid var(--border);
      z-index: 100; transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column;
      box-shadow: -24px 0 60px rgba(0,0,0,0.7);
    }
    #dm-painel.aberto { transform: translateX(0); }
    .painel-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); }
    .painel-titulo { font-size: 0.68rem; letter-spacing: 3px; text-transform: uppercase; color: var(--cyan); }
    .painel-fechar { background: none; border: none; color: var(--subtle); font-size: 1.4rem; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all 0.2s; line-height: 1; }
    .painel-fechar:hover { color: var(--text); background: rgba(255,255,255,0.06); }
    .painel-corpo { flex: 1; overflow-y: auto; padding: 24px; font-size: 0.875rem; line-height: 1.7; color: #c8d6e5; }
    .painel-corpo::-webkit-scrollbar { width: 3px; }
    .painel-corpo::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .painel-corpo h1,.painel-corpo h2,.painel-corpo h3 { color: var(--cyan); font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; margin: 20px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .painel-corpo h1:first-child,.painel-corpo h2:first-child,.painel-corpo h3:first-child { margin-top: 0; }
    .painel-corpo ul { padding-left: 0; list-style: none; }
    .painel-corpo ul li { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); line-height: 1.6; }
    .painel-corpo ul li::before { content: '·'; margin-right: 10px; color: var(--cyan); }
    .painel-corpo strong { color: rgba(0,212,255,0.75); font-weight: 600; }
    .painel-corpo p { margin: 8px 0; opacity: .85; }
    .painel-corpo .bloco-projeto { margin-bottom: 20px; }
    .dm-card-resultado { display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--cyan); font-size: 0.78rem; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; }
    .dm-card-resultado span { flex: 1; }
    .dm-card-resultado .badge { background: rgba(0,212,255,0.08); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 0.68rem; white-space: nowrap; }
  </style>
</head>

<script>
// ── Particle network ────────────────────────────────────────────
(function() {
  const cv = document.getElementById('bg-canvas');
  const cx = cv.getContext('2d');
  const N = 65, MAX_D = 170;
  let W, H, pts = [], speed = 1;

  function resize() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  function Pt() {
    this.x  = Math.random() * W;
    this.y  = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.35;
    this.vy = (Math.random() - 0.5) * 0.35;
    this.r  = Math.random() * 1.4 + 0.4;
    this.a  = Math.random() * 0.35 + 0.08;
  }
  for (let i = 0; i < N; i++) pts.push(new Pt());

  window._setBgState = s => { speed = s === 'think' ? 3.5 : s === 'listen' ? 2 : 1; };

  function frame() {
    cx.clearRect(0, 0, W, H);
    for (const p of pts) {
      p.x += p.vx * speed; p.y += p.vy * speed;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    }
    for (let i = 0; i < pts.length; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < MAX_D) {
          const a = (1 - d / MAX_D) * 0.14 * Math.min(speed, 2.5);
          cx.beginPath();
          cx.moveTo(pts[i].x, pts[i].y);
          cx.lineTo(pts[j].x, pts[j].y);
          cx.strokeStyle = `rgba(0,212,255,${a})`;
          cx.lineWidth = 0.5;
          cx.stroke();
        }
      }
    }
    for (const p of pts) {
      cx.beginPath();
      cx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      cx.fillStyle = `rgba(0,212,255,${p.a})`;
      cx.fill();
    }
    requestAnimationFrame(frame);
  }
  frame();
})();

// ── Orb ────────────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('orb');
  const ctx = canvas.getContext('2d');
  const W = 320, H = 320, cx = W/2, cy = H/2;
  let t = 0, state = 'idle';
  const colors = { idle:[0,212,255], listen:[0,102,255], think:[153,51,255], success:[0,255,136], error:[255,68,68] };
  const hexCol  = { idle:'#00d4ff', listen:'#0066ff', think:'#9933ff', success:'#00ff88', error:'#ff4444' };
  let cur = [...colors.idle], tgt = [...colors.idle];

  window._orbSetState = function(s) {
    state = s;
    tgt = [...(colors[s] || colors.idle)];
    if (window._setBgState) window._setBgState(s);
    if (window._neuralSetState) window._neuralSetState(s);
    const dot = document.getElementById('mini-dot');
    if (dot) { dot.style.background = hexCol[s]||hexCol.idle; dot.style.boxShadow = `0 0 12px ${hexCol[s]||hexCol.idle}`; }
    const lbl = document.getElementById('mini-label');
    const names = { idle:'DM', listen:'OUVINDO', think:'PENSANDO', success:'OK', error:'ERRO' };
    if (lbl) lbl.textContent = names[s] || 'DM';
  };

  function lerp(a, b, f) { return a + (b - a) * f; }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    cur = cur.map((v, i) => lerp(v, tgt[i], 0.05));
    const [r, g, b] = cur.map(Math.round);
    const spd = state === 'think' ? 3 : state === 'listen' ? 2 : 0.7;
    const amp = state === 'listen' ? 20 : state === 'think' ? 14 : 7;
    t += 0.016 * spd;

    // Outer glow
    const go = ctx.createRadialGradient(cx, cy, 55, cx, cy, 135);
    go.addColorStop(0, `rgba(${r},${g},${b},0.14)`);
    go.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.beginPath(); ctx.arc(cx, cy, 135, 0, Math.PI*2); ctx.fillStyle = go; ctx.fill();

    // Blob
    ctx.beginPath();
    for (let i = 0; i <= 64; i++) {
      const a = (i / 64) * Math.PI * 2;
      const noise = Math.sin(a*3+t)*amp*.5 + Math.sin(a*5-t*1.3)*amp*.3 + Math.sin(a*7+t*.7)*amp*.2;
      const rad = 72 + noise;
      const x = cx + Math.cos(a) * rad, y = cy + Math.sin(a) * rad;
      i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    const gb = ctx.createRadialGradient(cx-20, cy-20, 0, cx, cy, 80);
    gb.addColorStop(0, `rgba(${r},${g},${b},0.9)`);
    gb.addColorStop(.5, `rgba(${Math.round(r*.6)},${Math.round(g*.6)},${Math.round(b*.8)},0.7)`);
    gb.addColorStop(1, `rgba(${Math.round(r*.2)},${Math.round(g*.2)},${Math.round(b*.4)},0.5)`);
    ctx.fillStyle = gb; ctx.fill();

    // Highlight
    const gh = ctx.createRadialGradient(cx-24, cy-24, 0, cx, cy, 62);
    gh.addColorStop(0, `rgba(255,255,255,0.22)`);
    gh.addColorStop(1, `rgba(255,255,255,0)`);
    ctx.beginPath(); ctx.arc(cx, cy, 72, 0, Math.PI*2); ctx.fillStyle = gh; ctx.fill();

    requestAnimationFrame(draw);
  }
  draw();
})();

// ── Robot Wireframe ──────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('dm-core-canvas');
  const ctx = canvas.getContext('2d');
  const W = 520, H = 520, CX = 260, CY = 270;
  let t = 0, coreState = 'idle';

  const PALETTE = {
    idle:    [0, 212, 255],
    listen:  [0, 120, 255],
    think:   [153, 51, 255],
    success: [0, 255, 136],
    error:   [255, 68, 68],
  };
  let cur = [...PALETTE.idle], tgt = [...PALETTE.idle];
  function lerp(a,b,f){ return a+(b-a)*f; }

  window._neuralSetState = function(s) {
    coreState = s;
    tgt = [...(PALETTE[s] || PALETTE.idle)];
  };

  function rrect(x,y,w,h,r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
  }

  function frame() {
    ctx.clearRect(0, 0, W, H);
    const spd = coreState === 'think' ? 2.5 : coreState === 'listen' ? 1.8 : 1;
    t += 0.016 * spd;
    cur = cur.map((v,i) => lerp(v, tgt[i], 0.04));
    const [cr,cg,cb] = cur.map(Math.round);
    const gl = (a) => `rgba(${cr},${cg},${cb},${a})`;

    // Flutuação vertical
    const fy = Math.sin(t * 0.85) * 9;
    ctx.save();
    ctx.translate(0, fy);

    const pulse = Math.sin(t * 2) * 0.5 + 0.5;

    ctx.shadowBlur = 16;
    ctx.shadowColor = gl(0.85);

    // ── Antena ──
    ctx.beginPath(); ctx.moveTo(CX, CY-148); ctx.lineTo(CX, CY-118);
    ctx.strokeStyle = gl(0.6); ctx.lineWidth = 1.5; ctx.stroke();
    const aG = ctx.createRadialGradient(CX,CY-155,0,CX,CY-155,10+pulse*4);
    aG.addColorStop(0,'rgba(255,255,255,0.95)');
    aG.addColorStop(0.4,gl(0.85)); aG.addColorStop(1,gl(0));
    ctx.beginPath(); ctx.arc(CX,CY-155,10+pulse*3,0,Math.PI*2);
    ctx.fillStyle=aG; ctx.fill();

    // ── Cabeça ──
    rrect(CX-68,CY-118,136,98,24);
    ctx.strokeStyle=gl(0.72); ctx.lineWidth=1.9; ctx.stroke();

    // Olhos
    const blink = Math.abs(Math.sin(t*0.28))>0.96 ? 0.08 : 1;
    for (const ex of [CX-28, CX+28]) {
      const ey = CY-72, er=22;
      ctx.beginPath(); ctx.ellipse(ex,ey,er,er*blink,0,0,Math.PI*2);
      ctx.strokeStyle=gl(0.7); ctx.lineWidth=1.6; ctx.stroke();
      // glow fill
      const eG=ctx.createRadialGradient(ex,ey,0,ex,ey,er*0.85);
      eG.addColorStop(0,'rgba(255,255,255,0.98)');
      eG.addColorStop(0.3,gl(0.9)); eG.addColorStop(1,gl(0.05));
      ctx.beginPath(); ctx.ellipse(ex,ey,er*0.85,er*0.85*blink,0,0,Math.PI*2);
      ctx.fillStyle=eG; ctx.fill();
      // halo
      const hG=ctx.createRadialGradient(ex,ey,er,ex,ey,er*2.2);
      hG.addColorStop(0,gl(0.18)); hG.addColorStop(1,gl(0));
      ctx.beginPath(); ctx.arc(ex,ey,er*2.2,0,Math.PI*2);
      ctx.fillStyle=hG; ctx.fill();
    }

    // Linha boca / expressão
    ctx.beginPath();
    ctx.arc(CX, CY-30, 24, 0.15*Math.PI, 0.85*Math.PI);
    ctx.strokeStyle=gl(0.35); ctx.lineWidth=1.2; ctx.stroke();

    // ── Pescoço ──
    ctx.beginPath(); ctx.rect(CX-17,CY-22,34,20);
    ctx.strokeStyle=gl(0.38); ctx.lineWidth=1.2; ctx.stroke();

    // ── Corpo ──
    rrect(CX-68,CY-2,136,105,16);
    ctx.strokeStyle=gl(0.68); ctx.lineWidth=1.9; ctx.stroke();

    // Linhas peito
    for(let i=0;i<3;i++){
      ctx.beginPath();
      ctx.moveTo(CX-45,CY+20+i*24); ctx.lineTo(CX+45,CY+20+i*24);
      ctx.strokeStyle=gl(0.12+i*0.06); ctx.lineWidth=0.9; ctx.stroke();
    }

    // Reactor central
    const rp=Math.sin(t*2.2)*0.15+0.85;
    const rG=ctx.createRadialGradient(CX,CY+42,0,CX,CY+42,24*rp);
    rG.addColorStop(0,'rgba(255,255,255,0.95)');
    rG.addColorStop(0.3,gl(0.8)); rG.addColorStop(1,gl(0));
    ctx.beginPath(); ctx.arc(CX,CY+42,24*rp,0,Math.PI*2);
    ctx.fillStyle=rG; ctx.fill();
    ctx.beginPath(); ctx.arc(CX,CY+42,11,0,Math.PI*2);
    ctx.strokeStyle=gl(0.85); ctx.lineWidth=1.5; ctx.stroke();
    // DM no coração
    ctx.save();
    ctx.font = `bold ${Math.round(18+pulse*3)}px 'JetBrains Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = `rgba(255,255,255,${0.75+pulse*0.25})`;
    ctx.shadowBlur = 14+pulse*10;
    ctx.shadowColor = gl(1);
    ctx.fillText('DM', CX, CY+42);
    ctx.restore();

    // ── Braços ──
    for(const [ax] of [[CX-90],[CX+70]]){
      rrect(ax,CY,20,78,8);
      ctx.strokeStyle=gl(0.52); ctx.lineWidth=1.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(ax+10,CY+90,11,0,Math.PI*2);
      ctx.strokeStyle=gl(0.4); ctx.stroke();
    }

    // ── Hover glow (base) ──
    const hvG=ctx.createRadialGradient(CX,CY+118,0,CX,CY+118,58);
    hvG.addColorStop(0,gl(0.38+pulse*0.15)); hvG.addColorStop(1,gl(0));
    ctx.beginPath(); ctx.ellipse(CX,CY+118,58,15,0,0,Math.PI*2);
    ctx.fillStyle=hvG; ctx.fill();

    // Partículas orbitais flutuantes
    for(let i=0;i<18;i++){
      const a=(i/18)*Math.PI*2+t*0.12;
      const r=115+Math.sin(t+i)*12;
      const px=CX+Math.cos(a)*r, py=CY-10+Math.sin(a)*r*0.35;
      const pa=Math.sin(t*1.5+i)*0.3+0.35;
      ctx.beginPath(); ctx.arc(px,py,1.2+Math.sin(t+i)*0.8,0,Math.PI*2);
      ctx.fillStyle=gl(pa); ctx.fill();
    }

    ctx.restore();
    requestAnimationFrame(frame);
  }
  frame();
})();

// ── Clock ───────────────────────────────────────────────────────
const DAYS   = ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
const MONTHS = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
function updateClock() {
  const n = new Date();
  document.getElementById('clock-time').textContent =
    `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  document.getElementById('clock-date').textContent =
    `${DAYS[n.getDay()]} · ${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
}
updateClock();
setInterval(updateClock, 1000);

    const c = d.current_weather;
    const conds = {0:'Limpo',1:'Quase limpo',2:'Parcialmente nublado',3:'Nublado',45:'Neblina',48:'Neblina',51:'Chuvisco',53:'Chuvisco',55:'Chuvisco',61:'Chuva leve',63:'Chuva',65:'Chuva forte',80:'Pancadas',81:'Pancadas',82:'Pancadas',95:'Tempestade',96:'Tempestade',99:'Tempestade'};
    document.getElementById('weather-temp').textContent = `${Math.round(c.temperature)}°`;

let siIdx = 0;
setInterval(() => {

// ── Mode toggle ─────────────────────────────────────────────────
let isActive = false;

function ativarChat(autoTexto) {
  if (isActive) return;
  isActive = true;
  document.getElementById('view-idle').classList.add('hidden');
  document.getElementById('view-active').classList.add('visible');
  document.getElementById('mini-orb').style.display = 'flex';
  document.getElementById('hud-clock').classList.add('hidden');
  document.getElementById('hud-weather').classList.add('hidden');
  document.getElementById('hud-shortcuts').classList.add('hidden');
  document.getElementById('hud-sysinfo').classList.add('hidden');
  setTimeout(() => {
    const inp = document.getElementById('dm-input');
    inp.focus();
    if (autoTexto) { DM.enviarTexto(autoTexto); }
  }, 200);
}

function voltarIdle() {
  isActive = false;
  document.getElementById('view-idle').classList.remove('hidden');
  document.getElementById('view-active').classList.remove('visible');
  document.getElementById('mini-orb').style.display = 'none';
  document.getElementById('hud-clock').classList.remove('hidden');
  document.getElementById('hud-weather').classList.remove('hidden');
  document.getElementById('hud-shortcuts').classList.remove('hidden');
  document.getElementById('hud-sysinfo').classList.remove('hidden');
  fecharPainel();
}

// Qualquer tecla ativa o chat; ESC volta ao idle
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.altKey || e.metaKey) return;
  if (isActive && e.key === 'Escape') { voltarIdle(); return; }
  if (!isActive && e.key !== 'Escape' && e.key !== 'F5') {
    const firstChar = e.key.length === 1 ? e.key : '';
    ativarChat();
    if (firstChar) setTimeout(() => { const inp = document.getElementById('dm-input'); inp.value = firstChar; inp.focus(); }, 220);
  }
});

// ── Helpers ──────────────────────────────────────────────────────
function enviarTexto() {
  const inp = document.getElementById('dm-input');
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = '';
  DM.enviarTexto(txt);
}

function abrirPainel(titulo, html) {
  document.getElementById('painel-titulo').textContent = titulo;
  document.getElementById('painel-corpo').innerHTML = html;
  document.getElementById('dm-painel').classList.add('aberto');
}

function fecharPainel() {
  document.getElementById('dm-painel').classList.remove('aberto');
}
