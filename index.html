<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0E1014">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="dmsmart — automação residencial e comercial">
  <title>dmsmart</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/dmsmart.css">
  <link rel="stylesheet" href="css/zones.css">
  <link rel="stylesheet" href="css/wizard.css">
  <link rel="stylesheet" href="css/scenes.css">
  <link rel="stylesheet" href="css/floorplan.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="app-shell" id="app-shell">
    <aside class="app-sidebar" id="app-sidebar" aria-label="Menu lateral">
      <div class="sidebar-brand" aria-label="dmsmart">
        <span class="logo-dm">DM</span><span class="logo-smart">SMART</span><span class="logo-dot"></span>
      </div>

      <nav>
        <ul class="sidebar-nav" role="list">
          <li>
            <button class="sidebar-nav-item active" type="button" data-nav="dashboard">
              <span class="sidebar-nav-icon">
                <svg viewBox="0 0 24 24"><path d="M3 12 12 4l9 8"/><path d="M5 10v10h14V10"/></svg>
              </span>
              <span>Dashboard</span>
            </button>
          </li>
          <li>
            <button class="sidebar-nav-item" type="button" data-nav="ambientes">
              <span class="sidebar-nav-icon">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              </span>
              <span>Ambientes</span>
            </button>
          </li>
          <li>
            <button class="sidebar-nav-item" type="button" data-nav="cenas">
              <span class="sidebar-nav-icon">
                <svg viewBox="0 0 24 24"><path d="M13 3L6 14h7l-2 7 9-11h-7l2-7z"/></svg>
              </span>
              <span>Cenas</span>
            </button>
          </li>
          <li>
            <button class="sidebar-nav-item" type="button" data-nav="planta">
              <span class="sidebar-nav-icon">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
              </span>
              <span>Planta</span>
            </button>
          </li>
          <li class="sidebar-nav-sep"></li>
          <li>
            <button class="sidebar-nav-item" type="button" data-action="new-installation">
              <span class="sidebar-nav-icon">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
              </span>
              <span>Nova instalação</span>
            </button>
          </li>
        </ul>
      </nav>

      <div class="sidebar-foot">
        <div class="sidebar-install">
          <div class="sidebar-install-label">Instalação ativa</div>
          <div class="sidebar-install-name" id="sidebar-install-name">—</div>
        </div>
        <div id="sidebar-auth"></div>
        <button class="sidebar-toggle" type="button" id="sidebar-toggle" aria-label="Recolher sidebar">
          <svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg>
          <span>Recolher</span>
        </button>
      </div>
    </aside>

    <div class="app-main-wrap">
      <header class="app-header">
        <button class="header-menu" type="button" id="header-menu" aria-label="Abrir menu">☰</button>
        <div class="header-title-wrap">
          <div class="header-title" id="header-title">Dashboard</div>
          <div class="header-title-sub" id="header-sub">Controle rápido das suas zonas</div>
        </div>
        <div class="header-install-wrap" id="header-install-wrap">
          <button class="header-install-pill" type="button" id="install-pill" aria-label="Trocar instalação">
            <span class="install-pill-icon">
              <svg viewBox="0 0 24 24"><path d="M3 12 12 4l9 8"/><path d="M5 10v10h14V10"/></svg>
            </span>
            <span class="install-pill-name" id="install-pill-name">—</span>
            <span class="install-pill-chev">
              <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
            </span>
          </button>
          <div class="install-dropdown hidden" id="install-dropdown" role="menu"></div>
        </div>
        <div class="header-clock">
          <div class="clock" aria-live="polite" aria-label="Horário atual">--:--</div>
          <div class="date" aria-label="Data atual">---</div>
        </div>
        <div class="header-status">
          <span class="connection-dot" title="Status de conexão"></span>
          <span class="connection-label">Conectando</span>
        </div>
      </header>

      <main class="app-main">
        <section class="dashboard-hero" id="dashboard-hero" aria-label="Resumo da instalação">
          <div class="hero-greeting">
            <div class="hero-eyebrow" id="hero-eyebrow">Olá</div>
            <div class="hero-title" id="hero-title">Instalação</div>
            <div class="hero-sub" id="hero-sub">Carregando…</div>
          </div>
          <div class="hero-stats" id="hero-stats">
            <div class="hero-stat">
              <div class="hero-stat-icon">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
              </div>
              <div class="hero-stat-body">
                <div class="hero-stat-value" id="stat-devices-on">0</div>
                <div class="hero-stat-label">dispositivos ligados</div>
              </div>
            </div>
            <div class="hero-stat">
              <div class="hero-stat-icon">
                <svg viewBox="0 0 24 24"><path d="M3 12 12 4l9 8"/><path d="M5 10v10h14V10"/></svg>
              </div>
              <div class="hero-stat-body">
                <div class="hero-stat-value" id="stat-zones-active">0 <span class="hero-stat-total">/ 0</span></div>
                <div class="hero-stat-label">zonas ativas</div>
              </div>
            </div>
          </div>
        </section>
        <section class="scenes-section hidden" id="scenes-section" aria-label="Cenas e automações"></section>
        <section class="floorplan-section" id="floorplan-section" aria-label="Planta baixa interativa"></section>
        <div id="zones-filter-bar" class="zones-filter-bar" aria-label="Filtro de ambientes"></div>
        <section class="zones-grid" aria-label="Zonas da instalação">
          <!-- Cards renderizados pelo ui-renderer.js -->
        </section>
      </main>

      <footer class="app-footer">
        <span class="app-version" id="app-version">v04132000</span>
      </footer>
    </div>
  </div>

  <div id="wiz" class="wizard-container hidden" aria-label="Assistente de configuração"></div>
  <div id="manage-modal" class="modal-overlay hidden" aria-label="Gerenciar instalações"></div>

  <!-- Modal de login / conta — Fase 04 -->
  <div id="auth-modal" class="auth-modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Login">
    <div class="auth-modal-card">
      <div class="auth-modal-head">
        <div class="auth-modal-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M15 3h6v18h-6M10 17l5-5-5-5M15 12H3"/>
          </svg>
          Entrar no dmsmart
        </div>
        <button type="button" class="auth-modal-close" data-auth="close" aria-label="Fechar">×</button>
      </div>
      <div class="auth-modal-body">
        <div class="auth-field">
          <label for="auth-email">E-mail</label>
          <input type="email" id="auth-email" placeholder="seu@email.com" autocomplete="email" />
        </div>
        <div class="auth-field">
          <label for="auth-pass">Senha</label>
          <input type="password" id="auth-pass" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div class="auth-error" id="auth-error"></div>
        <button type="button" class="auth-submit-btn" id="auth-submit" data-auth="submit">Entrar</button>
      </div>
      <div class="auth-modal-foot">
        Config sincroniza entre dispositivos quando você está logado.
      </div>
    </div>
  </div>
  <div id="control-modal" class="control-modal-overlay hidden" aria-label="Controle de dispositivo"></div>
  <div id="zone-modal" class="zone-modal-overlay hidden" aria-label="Detalhe da zona"></div>
  <div id="zone-editor" class="zone-editor-overlay hidden" aria-label="Editor de ambiente"></div>

  <!-- Supabase SDK (antes de tudo que depende do SUPA) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth-store.js"></script>

  <script src="js/version.js"></script>
  <script src="js/config-loader.js"></script>
  <script src="js/installation-store.js"></script>
  <script src="js/active-installation.js"></script>
  <script src="js/zone-registry.js"></script>
  <script src="js/state-store.js"></script>
  <script src="js/ha-client.js"></script>
  <script src="js/control-modal.js"></script>
  <script src="js/zone-modal.js"></script>
  <script src="js/zone-editor.js"></script>
  <script src="js/ui-renderer.js"></script>
  <script src="js/scenes.js"></script>
  <script src="js/floorplan.js"></script>
  <script src="js/wizard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
